});

function readCSV(file,cb){const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsText(file,\'UTF-8\');}

function parseGeneric(text){
  const lines=text.trim().split(\'\n\').filter(l=>l.trim());
  if(!lines.length)return[];
  const header=lines[0].split(\',\').map(h=>h.trim().replace(/"/g,\'\').replace(/\r/g,\'\'));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const p=line.split(\',\');
    const obj={};
    header.forEach((h,i)=>{obj[h]=(p[i]||\'\').trim().replace(/"/g,\'\').replace(/\r/g,\'\');});
    return obj;
  });
}

function setSvcTitle(name){
  const m=name.match(/SSP\d+/i);
  if(m){
    const t=document.getElementById(\'page-title\');
    if(t)t.textContent=\'INSUCESSOS DE ENTREGA — \'+m[0].toUpperCase();
    document.title=\'Insucessos de Entrega — \'+m[0].toUpperCase()+ \'| Mercado Livre\';
  }
}

function handleFile1(file){
  if(!file)return;
  readCSV(file,text=>{
    const rows=parseGeneric(text).filter(r=>r.ID);
    if(!rows.length){alert(\'Arquivo vazio ou coluna ID não encontrada.\');return;}
    DATA=rows;
    setSvcTitle(file.name);
    document.getElementById(\'ub1\').className=\'upload-box loaded\';
    document.getElementById(\'ub1-sub\').textContent=file.name+\' — \'+DATA.length+\' registros\';
    document.getElementById(\'ub1-status\').textContent=\'✅ Atualizado\';
    document.getElementById(\'ub1-status\').style.color=\'#00A650\';
    populateSelects();renderDashboard();
  });
}

function handleFile2(file){
  if(!file)return;
  readCSV(file,text=>{
    DIT_DATA=parseGeneric(text).filter(r=>r.SHP_SHIPMENT_ID);
    if(!DIT_DATA.length){alert(\'Arquivo DIT vazio ou coluna SHP_SHIPMENT_ID não encontrada.\');return;}
    DIT_IDS=new Set(DIT_DATA.map(r=>r.SHP_SHIPMENT_ID.trim()));
    document.getElementById(\'ub2\').className=\'upload-box loaded2\';
    document.getElementById(\'ub2-sub\').textContent=file.name+\' — \'+DIT_DATA.length+\' registros DIT\';
    document.getElementById(\'ub2-status\').textContent=\'✅ Atualizado\';
    document.getElementById(\'ub2-status\').style.color=\'#2D3277\';
    if(DATA.length)renderDashboard();
  });
}

function freq(arr,key){const m={};arr.forEach(r=>{const v=r[key]||\'(vazio)\';m[v]=(m[v]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);}
function pct(v,t){return t?Math.round(v/t*100):0;}

function getFiltered(){
  const t=(document.getElementById(\'f-transp\')||{}).value||\'\';
  const s=(document.getElementById(\'f-status\')||{}).value||\'\';
  const n=(document.getElementById(\'f-nodo\')||{}).value||\'\';
  const d=(document.getElementById(\'f-dit\')||{}).value||\'\';
  return DATA.filter(r=>{
    if(t&&r.Transportadora!==t)return false;
    if(s&&r.Status_principal!==s)return false;
    if(n&&r.Nodo!==n)return false;
    if(d===\'dit\'&&!DIT_IDS.has(r.ID))return false;
    if(d===\'nodit\'&&DIT_IDS.has(r.ID))return false;
    return true;
  });
}

function getSearchFiltered(base){
  const id=(document.getElementById(\'s-id\')||{}).value||\'\';
  const nd=(document.getElementById(\'s-nodo\')||{}).value||\'\';
  const rt=(document.getElementById(\'s-rota\')||{}).value||\'\';
  const s1=(document.getElementById(\'s-status1\')||{}).value||\'\';
  const sb=(document.getElementById(\'s-sub1\')||{}).value||\'\';
  const sd=(document.getElementById(\'s-dit-filter\')||{}).value||\'\';
  return base.filter(r=>{
    if(id&&!r.ID.includes(id))return false;
    if(nd&&r.Nodo!==nd)return false;
    if(rt&&!r.ID_Rota.includes(rt))return false;
    if(s1&&r.Status_principal!==s1)return false;
    if(sb&&r.Sub_status!==sb)return false;
    if(sd===\'dit\'&&!DIT_IDS.has(r.ID))return false;
    if(sd===\'nodit\'&&DIT_IDS.has(r.ID))return false;
    return true;
  });
}

function populateSelects(){
  const transpV=[...new Set(DATA.map(r=>r.Transportadora).filter(Boolean))].sort();
  const statusV=[...new Set(DATA.map(r=>r.Status_principal).filter(Boolean))].sort();
  const nodoV=[...new Set(DATA.map(r=>r.Nodo).filter(Boolean))].sort();
  function fill(id,vals,all=\'Todos\'){const el=document.getElementById(id);if(!el)return;const cur=el.value;el.innerHTML=`<option value="">${all}</option>`;vals.forEach(v=>{const o=document.createElement(\'option\');o.value=v;o.textContent=v;el.appendChild(o);});el.value=cur;}
  fill(\'f-transp\',transpV,\'Todas\');fill(\'f-status\',statusV);fill(\'f-nodo\',nodoV);
  [\'f-transp\',\'f-status\',\'f-nodo\',\'f-dit\'].forEach(id=>{const el=document.getElementById(id);if(el)el.onchange=renderDashboard;});
}

function downloadCSV(){
  const base=getFiltered();
  const rows=getSearchFiltered(base);
  const ditMap={};
  DIT_DATA.forEach(r=>{if(!ditMap[r.SHP_SHIPMENT_ID])ditMap[r.SHP_SHIPMENT_ID]={motivo:r.Motivo,aging:r.Aging};});
  const header=[\'ID\',\'Nodo\',\'ID_Rota\',\'Status_principal\',\'Sub_status\',\'Transportadora\',\'Tipo_veiculo\',\'DIT\',\'Motivo_DIT\',\'Aging_DIT\'];
  const lines=[header.join(\',\')];
  rows.forEach(r=>{
    const dit=ditMap[r.ID];
    lines.push([r.ID,r.Nodo,r.ID_Rota,r.Status_principal,r.Sub_status,r.Transportadora,r.Tipo_veiculo,dit?\'SIM\':\'NAO\',dit?dit.motivo:\'\',dit?dit.aging:\'\'].join(\',\'));
  });
  const blob=new Blob([lines.join(\'\n\')],{type:\'text/csv;charset=utf-8;\'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement(\'a\');
  a.href=url;a.download=\'insucessos_filtrados_\'+new Date().toISOString().slice(0,10)+\'.csv\';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

          ${Object.entries(agingFreq).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>`

              <span class="aging-badge" style="background:${k.startsWith(\'1\')?\' #e8f5e9\':(k.startsWith(\'4\')?\' #fff3e0\':\' #fde8e8\')};color:${k.startsWith(\'1\')?\' #00A650\':(k.startsWith(\'4\')?\' #FF6B00\':\' #E5002B\')}">${k}</span>
              <div style="flex:1;margin:0 8px;background:#e8e8f0;border-radius:3px;height:11px"><div style="width:${pct(v,inDIT.length)}%;height:100%;border-radius:3px;background:${k.startsWith(\'1\')?\' #00A650\':(k.startsWith(\'4\')?\' #FF6B00\':\' #E5002B\')}"></div></div>
              <span style="font-weight:700;color:#2D3277;min-width:28px;text-align:right">${v}</span>
              <span style="color:#888;font-size:10px;min-width:34px;text-align:right">${pct(v,inDIT.length)}%</span>
            </div>`).join(\'\') }
          <div style="margin-top:8px;padding-top:8px;border-top:1px solid #e0e3f5">
            <div style="font-size:11px;color:#555;margin-bottom:5px">Detalhamento por ID:</div>
            <div style="max-height:120px;overflow-y:auto">
              ${ditRows.slice(0,30).map(r=>`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid #f0f0f0"><span style="color:#2D3277;font-family:monospace">${r.SHP_SHIPMENT_ID}</span><span style="color:#555;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:0 6px">${r.Motivo}</span><span class="aging-badge" style="background:${parseInt(r.Aging)<=3?\'#e8f5e9\':(parseInt(r.Aging)<=7?\'#fff3e0\':\'#fde8e8\')};color:${parseInt(r.Aging)<=3?\'#00A650\':(parseInt(r.Aging)<=7?\'#FF6B00\':\'#E5002B\')}">${r.Aging}d</span></div>`).join(\'\') }
              ${ditRows.length>30?`<div style="text-align:center;color:#888;font-size:10px;padding-top:4px">+${ditRows.length-30} registros</div>`:\'\'}
            </div>
          </div>
        </div>
      </div>
    </div>`:\'\'}

    <div class="section-title">DISTRIBUIÇÃO DE STATUS D1 — VISÃO GERAL</div>
    <div class="dist-grid">
      <div class="dist-card">
        <div class="dist-icon" style="background:#fff8e1"><svg width="26" height="26" viewBox="0 0 28 28"><rect x="3" y="8" width="18" height="14" rx="3" fill="#FFE600"/><circle cx="7" cy="23" r="3" fill="#2D3277"/><circle cx="17" cy="23" r="3" fill="#2D3277"/></svg></div>
        <div style="flex:1"><div class="dist-num">${atS}</div><div class="dist-pct">${pct(atS,total)}%</div><div class="dist-label">Na Estação</div><div class="dist-bar"><div class="dist-fill" style="width:${pct(atS,total)}%;background:#FFE600"></div></div></div>
      </div>
      <div class="dist-card">
        <div class="dist-icon" style="background:#e8eaf6"><svg width="26" height="26" viewBox="0 0 28 28"><rect x="2" y="10" width="18" height="11" rx="3" fill="#2D3277"/><circle cx="6" cy="22" r="3" fill="#2D3277" stroke="#fff" stroke-width="1.5"/><circle cx="16" cy="22" r="3" fill="#2D3277" stroke="#fff" stroke-width="1.5"/><path d="M20 14L26 14L26 18L20 18" fill="#FFE600"/></svg></div>
        <div style="flex:1"><div class="dist-num">${onR}</div><div class="dist-pct">${pct(onR,total)}%</div><div class="dist-label">Em Rota</div><div class="dist-bar"><div class="dist-fill" style="width:${pct(onR,total)}%;background:#2D3277"></div></div></div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card"><div class="section-title">STATUS D1 — PROPORÇÃO</div><div style="position:relative;height:185px"><canvas id="donut1" role="img" aria-label="Status D1">Status D1</canvas></div><div class="legend" id="leg1"></div></div>
      <div class="chart-card"><div class="section-title">SUB-STATUS D1 MAIS FREQUENTES</div><div id="substatus-bars"></div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-card"><div class="section-title">SUB-STATUS D0</div><div style="position:relative;height:185px"><canvas id="donut2" role="img" aria-label="Sub-status D0">Sub-status D0</canvas></div><div class="legend" id="leg2"></div></div>
      <div class="chart-card"><div class="section-title">DISTRIBUIÇÃO POR NODO</div><div style="position:relative;height:185px"><canvas id="donut3" role="img" aria-label="Nodos">Nodos</canvas></div><div class="legend" id="leg3"></div></div>
      <div class="chart-card"><div class="section-title">&#9888; CRÍTICOS POR NODO</div><div id="criticos-bars"></div></div>
      <div class="chart-card"><div class="section-title">TRANSPORTADORAS — TOP 8</div><div id="transp-bars"></div></div>
    </div>

    <div class="section-title">&#128230; PACOTES POR NODO</div>
    <div class="chart-card" style="margin-bottom:12px"><div id="nodo-bars"></div></div>

    <div class="search-section">
      <div class="search-title">
        &#128269; BUSCA AVANÇADA DE PACOTES
        <span class="search-sub">Filtre e exporte os registros</span>
        <button class="btn-download" onclick="downloadCSV()" style="margin-left:auto">&#11015; Baixar CSV filtrado</button>
      </div>
      <div class="search-filters">
        <div class="sf-group"><div class="sf-label">&#128230; ID PACOTE</div><input type="text" id="s-id" placeholder="" oninput="renderTable()"></div>
        <div class="sf-group"><div class="sf-label">&#128205; NODO</div><select id="s-nodo" onchange="renderTable()"><option value="">Todos</option></select></div>
        <div class="sf-group"><div class="sf-label">&#128506; ID ROTA</div><input type="text" id="s-rota" placeholder="" oninput="renderTable()"></div>
        <div class="sf-group"><div class="sf-label">&#128308; STATUS D1</div><select id="s-status1" onchange="renderTable()"><option value="">Todos</option></select></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 2fr;gap:8px;margin-bottom:10px">
        <div class="sf-group"><div class="sf-label">&#128993; SUB STATUS D1</div><select id="s-sub1" onchange="renderTable()"><option value="">Todos</option></select></div>
        <div class="sf-group"><div class="sf-label">&#9201; DIT</div><select id="s-dit-filter" onchange="renderTable()"><option value="">Todos</option><option value="dit">Somente DIT</option><option value="nodit">Sem DIT</option></select></div>
        <div style="display:flex;align-items:flex-end;gap:8px"><button class="btn-clear" onclick="clearSearch()">&#10005; Limpar filtros</button><span class="filter-count" id="s-count" style="padding-bottom:4px"></span></div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th onclick="sortTable(\'ID\')">ID PACOTE &#8597;</th>
            <th onclick="sortTable(\'Nodo\')">NODO &#8597;</th>
            <th onclick="sortTable(\'ID_Rota\')">ID ROTA &#8597;</th>
            <th onclick="sortTable(\'Status_principal\')">STATUS D1 &#8597;</th>
            <th onclick="sortTable(\'Sub_status\')">SUB STATUS D1 &#8597;</th>
            <th onclick="sortTable(\'Transportadora\')">TRANSPORTADORA &#8597;</th>
            <th>DIT</th><th>MOTIVO DIT</th><th>AGING</th>
          </tr></thead>
          <tbody id="tbl-body"></tbody>
        </table>
      </div>
    </div>`;

  populateSearchSelects();
  renderCharts(filt,total,byNodo,onR,atS);
  renderTable();
}

function populateSearchSelects(){
  const nodoV=[...new Set(DATA.map(r=>r.Nodo).filter(Boolean))].sort();
  const statusV=[...new Set(DATA.map(r=>r.Status_principal).filter(Boolean))].sort();
  const subV=[...new Set(DATA.map(r=>r.Sub_status).filter(Boolean))].sort();
  function fill(id,vals){const el=document.getElementById(id);if(!el)return;const cur=el.value;el.innerHTML=\'<option value="">Todos</option>\';vals.forEach(v=>{const o=document.createElement(\'option\');o.value=v;o.textContent=v;el.appendChild(o);});el.value=cur;}
  fill(\'s-nodo\',nodoV);fill(\'s-status1\',statusV);fill(\'s-sub1\',subV);
}

function renderCharts(filt,total,byNodo,onR,atS){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
  charts.d1=new Chart(document.getElementById(\'donut1\'),{type:\'doughnut\',data:{labels:[\'Em Rota\',\'Na Estação\'],datasets:[{data:[onR,atS],backgroundColor:[\'#2D3277\',\'#FFE600\'],borderWidth:2,borderColor:\'#fff\'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.parsed} (${pct(ctx.parsed,total)}%)`}}}}});
  document.getElementById(\'leg1\').innerHTML=`<span class="leg-item"><span class="leg-dot" style="background:#2D3277"></span>Em Rota ${onR} (${pct(onR,total)}%)</span><span class="leg-item"><span class="leg-dot" style="background:#FFE600"></span>Na Estação ${atS} (${pct(atS,total)}%)</span>`;
  const subD1=freq(filt,\'Sub_status\').slice(0,8);const maxD1=subD1[0]?subD1[0][1]:1;
  document.getElementById(\'substatus-bars\').innerHTML=subD1.map((x,i)=>`<div class="bar-row"><div class="bar-label" title="${x[0]}">${x[0]}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(x[1]/maxD1*100)}%;background:${ML_COLORS[i%ML_COLORS.length]}">${x[1]}</div></div><div class="bar-pct">${pct(x[1],total)}%</div></div>`).join(\'\');
  const subD0=freq(filt,\'Sub_status\').slice(0,8);
  charts.d2=new Chart(document.getElementById(\'donut2\'),{type:\'doughnut\',data:{labels:subD0.map(x=>x[0]),datasets:[{data:subD0.map(x=>x[1]),backgroundColor:ML_COLORS.slice(0,subD0.length),borderWidth:2,borderColor:\'#fff\'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.parsed} (${pct(ctx.parsed,total)}%)`}}}}});
  document.getElementById(\'leg2\').innerHTML=subD0.slice(0,5).map((x,i)=>`<span class="leg-item"><span class="leg-dot" style="background:${ML_COLORS[i]}"></span>${x[0].slice(0,20)} ${pct(x[1],total)}%</span>`).join(\'\');
  const nodoDist=byNodo.slice(0,10);
  charts.d3=new Chart(document.getElementById(\'donut3\'),{type:\'doughnut\',data:{labels:nodoDist.map(x=>x[0]),datasets:[{data:nodoDist.map(x=>x[1]),backgroundColor:ML_COLORS.slice(0,nodoDist.length),borderWidth:2,borderColor:\'#fff\'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.parsed} (${pct(ctx.parsed,total)}%)`}}}}});
  document.getElementById(\'leg3\').innerHTML=nodoDist.slice(0,5).map((x,i)=>`<span class="leg-item"><span class="leg-dot" style="background:${ML_COLORS[i]}"></span>${x[0]} ${pct(x[1],total)}%</span>`).join(\'\');
  const maxN=byNodo[0]?byNodo[0][1]:1;
  document.getElementById(\'criticos-bars\').innerHTML=byNodo.slice(0,8).map((x,i)=>`<div class="bar-row"><div class="bar-label" title="${x[0]}">${x[0]}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(x[1]/maxN*100)}%;background:${ML_COLORS[i%ML_COLORS.length]}">${x[1]}</div></div><div class="bar-pct">${pct(x[1],total)}%</div></div>`).join(\'\');
  const transp=freq(filt,\'Transportadora\').slice(0,8);const maxT=transp[0]?transp[0][1]:1;
  document.getElementById(\'transp-bars\').innerHTML=transp.map((x,i)=>`<div class="bar-row"><div class="bar-label" title="${x[0]}">${x[0]}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(x[1]/maxT*100)}%;background:${ML_COLORS[i%ML_COLORS.length]}">${x[1]}</div></div><div class="bar-pct">${pct(x[1],total)}%</div></div>`).join(\'\');
  document.getElementById(\'nodo-bars\').innerHTML=byNodo.map((x,i)=>`<div class="node-row"><div class="node-label" title="${x[0]}">${x[0]}</div><div class="node-bar-track"><div class="node-bar-fill" style="width:${Math.round(x[1]/maxN*100)}%;background:${ML_COLORS[i%ML_COLORS.length]}">${x[1]} pkg</div></div><div class="node-pct">${pct(x[1],total)}%</div></div>`).join(\'\');
}

function renderTable(){
  const tbody=document.getElementById(\'tbl-body\');if(!tbody)return;
  const base=getFiltered();let rows=getSearchFiltered(base);
  if(sortCol)rows.sort((a,b)=>a[sortCol]>b[sortCol]?sortDir:-sortDir);
  const sc=document.getElementById(\'s-count\');if(sc)sc.textContent=rows.length+\' registros\';
  const ditMap={};
  DIT_DATA.forEach(r=>{if(!ditMap[r.SHP_SHIPMENT_ID])ditMap[r.SHP_SHIPMENT_ID]={motivo:r.Motivo,aging:r.Aging};});
  tbody.innerHTML=rows.slice(0,300).map(r=>{
    const dit=ditMap[r.ID];const ag=dit?parseInt(dit.aging):null;
    return`<tr>
      <td style="font-family:monospace;font-size:11px">${r.ID}</td>
      <td>${r.Nodo||\'-\'}</td>
      <td style="font-size:11px">${r.ID_Rota}</td>
      <td><span class="badge ${r.Status_principal===\'on_route\'?\'b-on\':\'b-at\'}">${r.Status_principal===\'on_route\'?\'🚗\':\'🏢\'} ${r.Status_principal}</span></td>
      <td>${r.Sub_status}</td><td>${r.Transportadora}</td>
      <td>${dit?\'<span class="badge b-dit">⏱ DIT</span>\':\'<span class="badge b-nodit">—</span>\'}</td>
      <td style="font-size:11px;max-width:160px;overflow:hidden;text-overflow:ellipsis">${dit?dit.motivo:\'-\'}</td>
      <td>${dit?`<span class="aging-badge" style="background:${ag<=3?\'#e8f5e9\':(ag<=7?\'#fff3e0\':\'#fde8e8\')};color:${ag<=3?\'#00A650\':(ag<=7?\'#FF6B00\':\'#E5002B\')}">${dit.aging}d</span>`:\'-\'}</td>
    </tr>`;}).join(\'\');
}

function sortTable(col){sortCol=col;sortDir*=-1;renderTable();}
function clearFilters(){[\'f-transp\',\'f-status\',\'f-nodo\',\'f-dit\'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=\'\';});renderDashboard();}
function clearSearch(){[\'s-id\',\'s-rota\'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=\'\';});[\'s-nodo\',\'s-status1\',\'s-sub1\',\'s-dit-filter\'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=\'\';});renderTable();}

// Auto-carrega os dados embutidos
(function init(){
  DATA=parseGeneric(PRELOADED_INS_RAW).filter(r=>r.ID);
  DIT_DATA=parseGeneric(PRELOADED_DIT_RAW).filter(r=>r.SHP_SHIPMENT_ID);
  DIT_IDS=new Set(DIT_DATA.map(r=>r.SHP_SHIPMENT_ID.trim()));
  document.getElementById(\'ub1-sub\').textContent=PRELOADED_INS_NAME+\' — \'+DATA.length+\' registros\';
  document.getElementById(\'ub1-status\').textContent=\'✅ Dados pré-carregados\';
  document.getElementById(\'ub1-status\').style.color=\'#00A650\';
  document.getElementById(\'ub2-sub\').textContent=PRELOADED_DIT_NAME+\' — \'+DIT_DATA.length+\' registros DIT\';
  document.getElementById(\'ub2-status\').textContent=\'✅ Dados pré-carregados\';
  document.getElementById(\'ub2-status\').style.color=\'#2D3277\';
  populateSelects();
  renderDashboard();
})();
</script>
</body>
</html>
